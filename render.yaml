services:
  - type: web
    name: orphan-management
    env: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false        # set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false        # set this manually in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false        # set this manually in Render dashboard
